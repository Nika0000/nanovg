name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-core:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

  build-examples-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libglfw3-dev libglew-dev libvulkan-dev libx11-xcb-dev

      - name: Configure with examples
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DNANOVG_BUILD_EXAMPLES=ON

      - name: Build all examples
        run: cmake --build build --config Release

  build-examples-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Vulkan SDK
        run: |
          $ver = "1.3.290.0"
          $installer = "VulkanSDK-${ver}-Installer.exe"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/${ver}/windows/${installer}" -OutFile $installer
          Start-Process -FilePath ".\$installer" -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\${ver}"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH

      - name: Install GLFW
        run: |
          vcpkg install glfw3:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure with examples
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DNANOVG_BUILD_EXAMPLES=ON -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE"

      - name: Build D3D11 example
        run: cmake --build build --config Release --target example_d3d11

      - name: Build OpenGL example
        run: cmake --build build --config Release --target example_gl3

      - name: Build Vulkan example
        run: cmake --build build --config Release --target example_vulkan

      - name: Build Vulkan minimal example
        run: cmake --build build --config Release --target example_vulkan_min

  build-examples-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: brew install glfw glew

      - name: Configure with examples
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DNANOVG_BUILD_EXAMPLES=ON

      - name: Build all examples
        run: cmake --build build --config Release

  build-metal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure with Metal backend
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DNANOVG_PLATFORM_METAL=ON

      - name: Build
        run: cmake --build build --config Release
