name: Recompile Shaders

on:
  push:
    branches: [main]
    paths:
      - "shaders/d3d11/*.hlsl"
      - "shaders/metal/*.metal"
      - "shaders/vulkan/*.vert"
      - "shaders/vulkan/*.frag"
  workflow_dispatch:

jobs:
  recompile-d3d11:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Find Windows SDK fxc.exe
        id: fxc
        shell: pwsh
        run: |
          $fxc = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\fxc.exe" | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $fxc) { throw "fxc.exe not found" }
          echo "dir=$($fxc.DirectoryName)" >> $env:GITHUB_OUTPUT

      - name: Compile D3D11 shaders
        shell: cmd
        working-directory: shaders/d3d11
        run: |
          set FXC=${{ steps.fxc.outputs.dir }}\fxc.exe
          "%FXC%" /Fh D3D11PixelShader.h /T ps_4_0_level_9_3 /E D3D11PixelShader_Main D3D11PixelShader.hlsl
          "%FXC%" /Fh D3D11PixelShaderAA.h /T ps_4_0_level_9_3 /E D3D11PixelShaderAA_Main D3D11PixelShaderAA.hlsl
          "%FXC%" /Fh D3D11VertexShader.h /T vs_4_0_level_9_3 /E D3D11VertexShader_Main D3D11VertexShader.hlsl

      - name: Upload compiled shaders
        uses: actions/upload-artifact@v4
        with:
          name: d3d11-shaders
          path: shaders/d3d11/*.h

  recompile-metal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Compile Metal shaders
        run: |
          SHADER="shaders/metal/nanovg_mtl_shaders.metal"
          OUTDIR="shaders/metal"
          TMPDIR=$(mktemp -d)

          generate() {
            local sdk=$1
            local name=$2
            local var_name="mnvg_bitcode_${name}"

            xcrun -sdk "$sdk" metal -c "$SHADER" -o "$TMPDIR/${name}.air"
            xcrun -sdk "$sdk" metallib "$TMPDIR/${name}.air" -o "$TMPDIR/${name}.metallib"

            echo "unsigned char ${var_name}[] = {" > "$OUTDIR/${name}.h"
            xxd -i < "$TMPDIR/${name}.metallib" >> "$OUTDIR/${name}.h"
            echo "};" >> "$OUTDIR/${name}.h"
            echo "unsigned int ${var_name}_len = sizeof(${var_name});" >> "$OUTDIR/${name}.h"

            echo "Generated $name ($(wc -c < "$TMPDIR/${name}.metallib") bytes)"
          }

          generate macosx macos
          generate iphoneos ios
          generate appletvos tvos
          generate iphonesimulator simulator

          rm -rf "$TMPDIR"

      - name: Upload compiled shaders
        uses: actions/upload-artifact@v4
        with:
          name: metal-shaders
          path: |
            shaders/metal/macos.h
            shaders/metal/ios.h
            shaders/metal/tvos.h
            shaders/metal/simulator.h

  recompile-vulkan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install glslang
        run: sudo apt-get update && sudo apt-get install -y glslang-tools

      - name: Compile Vulkan shaders
        working-directory: shaders/vulkan
        run: |
          glslangValidator -V fill.vert -o fill.vert.spv
          glslangValidator -V fill.frag -o fill.frag.spv

          # Convert SPIR-V to C include format (uint32_t hex array)
          spirv_to_inc() {
            local input=$1
            local output=$2
            echo "" > "$output"
            xxd -i < "$input" | sed 's/unsigned char.*\[\] = {//;s/};//;s/unsigned int.*//;s/^ *//' | \
              python3 -c "
          import sys
          data = bytes(int(x.strip().rstrip(','), 16) for x in sys.stdin.read().replace('\n', ',').split(',') if x.strip())
          words = [int.from_bytes(data[i:i+4], 'little') for i in range(0, len(data), 4)]
          for i in range(0, len(words), 8):
              line = ','.join(f'0x{w:08x}' for w in words[i:i+8])
              print(line + ',')
          " >> "$output"
          }

          spirv_to_inc fill.vert.spv fill.vert.inc
          spirv_to_inc fill.frag.spv fill.frag.inc

          rm -f fill.vert.spv fill.frag.spv

      - name: Upload compiled shaders
        uses: actions/upload-artifact@v7
        with:
          name: vulkan-shaders
          path: |
            shaders/vulkan/fill.vert.inc
            shaders/vulkan/fill.frag.inc

  create-pr:
    runs-on: ubuntu-latest
    needs: [recompile-d3d11, recompile-metal, recompile-vulkan]
    if: "!cancelled() && (needs.recompile-d3d11.result == 'success' || needs.recompile-metal.result == 'success' || needs.recompile-vulkan.result == 'success')"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Download D3D11 shaders
        if: needs.recompile-d3d11.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: d3d11-shaders
          path: shaders/d3d11

      - name: Download Metal shaders
        if: needs.recompile-metal.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: metal-shaders
          path: shaders/metal

      - name: Download Vulkan shaders
        if: needs.recompile-vulkan.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: vulkan-shaders
          path: shaders/vulkan

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/recompile-shaders
          commit-message: "chore: recompile shaders from source"
          title: "chore: recompile shaders"
          body: |
            Automated shader recompilation triggered by source changes in `shaders/`.

            This PR updates the compiled shader headers to match the latest source.
          delete-branch: true
